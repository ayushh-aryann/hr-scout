  input,textarea,select{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:10px;color:#eae7df;outline:none;transition:border-color .3s;}
  input:focus,textarea:focus{border-color:rgba(255,216,77,.5);}

  @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

  @keyframes progressBar{from{width:0}to{width:100%}}

  .backdrop-panel{background:rgba(10,10,11,.92);backdrop-filter:blur(20px);}

  .nav-link::after{content:"";position:absolute;left:0;right:0;bottom:-4px;height:1px;background:currentColor;transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(.2,.8,.2,1);}
  .nav-link:hover::after{transform:scaleX(1);}
  .nav-link{position:relative;}

<script type="text/babel" data-presets="env,react">
const { useEffect, useState, useRef, useCallback } = React;

const API = "http://127.0.0.1:8000/api/v1";

// ── Helpers ──────────────────────────────────────────────────────────────────
function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    const io=new IntersectionObserver(entries=>{
      entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});
    },{threshold:.12});
    els.forEach(el=>io.observe(el));
    return()=>io.disconnect();
  },[]);
}

function recColor(rec){
  if(rec==='hire') return '#4ade80';
  if(rec==='borderline') return '#fbbf24';
  return '#f87171';
}
function recLabel(rec){
  return {hire:'Hire',borderline:'Borderline',no_hire:'No Hire'}[rec]||rec;
}
function recBg(rec){
  return {hire:'rgba(74,222,128,.12)',borderline:'rgba(251,191,36,.12)',no_hire:'rgba(248,113,113,.12)'}[rec]||'rgba(255,255,255,.04)';
}
function scoreColor(s){
  if(s>=7) return '#4ade80';
  if(s>=4) return '#fbbf24';
  return '#f87171';
}

// ── Particle field ────────────────────────────────────────────────────────────
function ParticleField(){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    const ctx=cv.getContext('2d');
    const dpr=Math.min(2,window.devicePixelRatio||1);
    let raf,dots=[],mouse={x:0,y:0};
    const resize=()=>{
      cv.width=window.innerWidth*dpr;cv.height=window.innerHeight*dpr;
      cv.style.width=window.innerWidth+'px';cv.style.height=window.innerHeight+'px';
      const N=Math.min(180,Math.floor(window.innerWidth/9));
      dots=Array.from({length:N},()=>({
        x:Math.random()*cv.width,y:Math.random()*cv.height,
        vx:(Math.random()-.5)*.22*dpr,vy:(Math.random()-.5)*.22*dpr,
        r:(Math.random()*1.3+.4)*dpr,
        c:Math.random()<.15?'#ffd84d':Math.random()<.4?'#7cd6c8':'#ffffff',
        a:Math.random()*.45+.12
      }));
    };
    const onMove=e=>{mouse.x=e.clientX*dpr;mouse.y=e.clientY*dpr;};
    const loop=()=>{
      ctx.clearRect(0,0,cv.width,cv.height);
      for(const d of dots){
        d.x+=d.vx;d.y+=d.vy;
        if(d.x<0||d.x>cv.width)d.vx*=-1;
        if(d.y<0||d.y>cv.height)d.vy*=-1;
        const dx=d.x-mouse.x,dy=d.y-mouse.y,dist2=dx*dx+dy*dy;
        if(dist2<140*dpr*(140*dpr)){
          const f=(1-Math.sqrt(dist2)/(140*dpr))*.6;
          d.x+=dx/Math.sqrt(dist2||1)*f*1.5;d.y+=dy/Math.sqrt(dist2||1)*f*1.5;
        }
        ctx.globalAlpha=d.a;ctx.fillStyle=d.c;
        ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;raf=requestAnimationFrame(loop);
    };
    resize();window.addEventListener('resize',resize);window.addEventListener('mousemove',onMove);
    raf=requestAnimationFrame(loop);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);window.removeEventListener('mousemove',onMove);};
  },[]);
  return <canvas ref={ref} className="absolute inset-0 w-full h-full pointer-events-none"/>;
}

// ── Scout logo ────────────────────────────────────────────────────────────────
function ScoutMark({size=28}){
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
      <defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stopColor="#ffe585"/><stop offset="1" stopColor="#f5b800"/>
      </linearGradient></defs>
      <circle cx="32" cy="32" r="22" fill="url(#sg)"/>
      <path d="M22 28 L32 20 L42 28" stroke="#1a1a1d" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
      <rect x="26" y="32" width="12" height="10" rx="2" fill="#1a1a1d"/>
      <circle cx="22" cy="38" r="4" fill="#1a1a1d"/>
      <circle cx="42" cy="38" r="4" fill="#1a1a1d"/>
      <path d="M18 38 L26 38 M38 38 L46 38" stroke="#1a1a1d" strokeWidth="2" strokeLinecap="round"/>
    </svg>
  );
}

// ── Metal button ──────────────────────────────────────────────────────────────
function MetalBtn({children,dark=false,className="",onClick,disabled=false,icon="→"}){
  return (
    <button onClick={onClick} disabled={disabled}
      className={`metal-btn ${dark?'dark':''} ${className} inline-flex group ${disabled?'opacity-50 cursor-not-allowed':''}`}>
      <span className="metal-fill" aria-hidden/>
      <span className={`metal-inner inline-flex items-center gap-2 px-5 h-11 text-[14px] font-medium tracking-tight ${dark?'text-white':'text-[#1a1a1d]'}`}>
        {children}{icon&&<span>{icon}</span>}
      </span>
    </button>
  );
}

// ── Navbar ────────────────────────────────────────────────────────────────────
function Navbar({view,setView}){
  const [scrolled,setScrolled]=useState(false);
  useEffect(()=>{
    const onS=()=>setScrolled(window.scrollY>40);
    window.addEventListener('scroll',onS,{passive:true});
    return()=>window.removeEventListener('scroll',onS);
  },[]);
  return (
    <header className={`fixed top-0 inset-x-0 z-50 transition-all duration-500 ${scrolled?'pt-3':'pt-5'}`}>
      <nav className={`mx-auto transition-all duration-500 ${scrolled?'max-w-3xl':'max-w-6xl'} px-5 h-14 flex items-center justify-between rounded-full
        ${scrolled?'bg-black/60 backdrop-blur-xl border border-white/10 shadow-[0_20px_60px_-20px_rgba(0,0,0,.6)]':'bg-transparent'}`}>
        <a href="#" onClick={()=>setView('upload')} className="flex items-center gap-2.5">
          <span className="bob"><ScoutMark size={26}/></span>
          <span className="text-[15px] font-semibold tracking-tight">HR Scout</span>
          <span className="mono text-[10px] text-white/40 ml-1">v1.0</span>
        </a>
        <div className="hidden md:flex items-center gap-7 text-[13px] text-white/70">
          <button className={`nav-link transition ${view==='upload'?'text-white':''}`} onClick={()=>setView('upload')}>Upload</button>
          <button className={`nav-link transition ${view==='results'?'text-white':''}`} onClick={()=>setView('results')}>Results</button>
          <a href="/docs" className="nav-link" target="_blank">API Docs</a>
        </div>
        <div className="flex items-center gap-2">
          <MetalBtn onClick={()=>setView('upload')}>New Analysis</MetalBtn>
        </div>
      </nav>
    </header>
  );
}

// ── Step indicator ────────────────────────────────────────────────────────────
function Steps({current}){
  const steps=[{n:'01',t:'Job Description'},{n:'02',t:'Upload Resumes'},{n:'03',t:'Analysis'},{n:'04',t:'Shortlist'}];
  return (
    <div className="flex items-center gap-0 mb-12">
      {steps.map((s,i)=>(
        <React.Fragment key={i}>
          <div className={`flex items-center gap-2 transition-all ${i<current?'opacity-40':i===current?'opacity-100':'opacity-30'}`}>
            <div className={`w-7 h-7 rounded-full border flex items-center justify-center mono text-[11px] font-bold
              ${i===current?'border-[#ffd84d] text-[#ffd84d] bg-[rgba(255,216,77,.1)]':i<current?'border-[#4ade80] text-[#4ade80]':'border-white/20 text-white/40'}`}>
              {i<current?'✓':s.n}
            </div>
            <span className={`text-[12px] hidden sm:block ${i===current?'text-white font-medium':'text-white/50'}`}>{s.t}</span>
          </div>
          {i<steps.length-1&&<div className="w-8 md:w-16 h-px bg-white/10 mx-2"/>}
        </React.Fragment>
      ))}
    </div>
  );
}

// ── Upload view ───────────────────────────────────────────────────────────────
function UploadView({onAnalyze}){
  useReveal();
  const [jdText,setJdText]=useState('');
  const [files,setFiles]=useState([]);
  const [dragging,setDragging]=useState(false);
  const [error,setError]=useState('');
  const fileRef=useRef(null);

  const handleDrop=useCallback(e=>{
    e.preventDefault();setDragging(false);
    const dropped=[...e.dataTransfer.files].filter(f=>
      f.name.match(/\.(pdf|docx|doc|json)$/i)
    );
    setFiles(prev=>[...prev,...dropped].slice(0,20));
  },[]);

  const handleFileChange=e=>{
    const picked=[...e.target.files].filter(f=>f.name.match(/\.(pdf|docx|doc|json)$/i));
    setFiles(prev=>[...prev,...picked].slice(0,20));
  };

  const removeFile=i=>setFiles(prev=>prev.filter((_,idx)=>idx!==i));

  const handleSubmit=async()=>{
    if(!jdText.trim()){setError('Please enter a Job Description.');return;}
    if(files.length===0){setError('Please upload at least one candidate file.');return;}
    setError('');
    onAnalyze(jdText,files);
  };

  const loadSample=()=>{
    setJdText(`Senior Full-Stack Engineer

We are a fast-growing fintech startup. We need a Senior Full-Stack Engineer to scale our payments platform.

Responsibilities:
- Design and build high-performance APIs using Python (FastAPI/Django)
- Lead frontend development with React + TypeScript
- Own the full SDLC from architecture to Kubernetes deployment
- Code reviews and mentoring junior engineers
- Drive technical architecture and CI/CD practices

Required Skills: Python, React, TypeScript, PostgreSQL, Redis, Docker, Kubernetes, GitHub Actions, REST API

Preferred Skills: Go, GraphQL, AWS, Kafka, Microservices, prior fintech experience

Requirements:
- 5+ years professional experience
- Bachelor's in Computer Science or equivalent
- AWS Certified Developer a plus
- Excellent communication (remote-first team)`);
  };

  return (
    <section className="relative min-h-screen pt-28 pb-20">
      <div className="absolute inset-0"><ParticleField/><div className="absolute dots-bg inset-0 opacity-30"/>
        <div className="absolute -top-40 left-1/2 -translate-x-1/2 w-[900px] h-[900px] rounded-full"
          style={{background:'radial-gradient(closest-side,rgba(255,216,77,.14),transparent 70%)'}}/>
        <div className="absolute inset-0 scanlines opacity-20 pointer-events-none"/>
      </div>

      <div className="relative max-w-5xl mx-auto px-6">
        <div className="text-center mb-14">
          <div className="reveal inline-flex items-center gap-2 px-3 h-8 rounded-full border border-white/10 bg-white/[.03] backdrop-blur mono text-[11px] tracking-widest uppercase text-white/70 mb-6">
            <span className="w-2 h-2 rounded-full bg-[#ffd84d] pulseDot"/>&nbsp;AI-Powered · Multi-Dimension Rubric · Explainable
          </div>
          <h1 className="reveal serif text-[60px] md:text-[90px] leading-[.9] tracking-tighter">
            Find the <span className="italic gold-text">right hire.</span><br/>
            <span className="grad-text">Every time.</span>
          </h1>
          <p className="reveal mt-5 max-w-2xl mx-auto text-[17px] text-white/60 leading-relaxed">
            Upload a Job Description and candidate resumes. HR Scout parses, scores on 5 weighted dimensions, and delivers a ranked shortlist with transparent justifications.
          </p>
        </div>

        <Steps current={0}/>

        <div className="grid md:grid-cols-2 gap-6">
          {/* JD Panel */}
          <div className="reveal feat-card rounded-2xl border border-white/10 bg-[#0a0a0b] overflow-hidden">
            <div className="bar bg-[#15151a] border-b border-white/5 px-5 h-10 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="w-2.5 h-2.5 rounded-full bg-white/15"/>
                <span className="w-2.5 h-2.5 rounded-full bg-white/15"/>
                <span className="w-2.5 h-2.5 rounded-full bg-[#ffd84d]"/>
                <span className="mono text-[11px] text-white/50 ml-2">job_description.txt</span>
              </div>
              <button onClick={loadSample} className="mono text-[10px] text-[#ffd84d] hover:text-white transition">
                load sample ↗
              </button>
            </div>
            <div className="p-5">
              <textarea
                value={jdText}
                onChange={e=>setJdText(e.target.value)}
                placeholder="Paste the full job description here…&#10;&#10;Include: title, required skills, preferred skills, years of experience, education requirements, responsibilities."
                className="w-full h-72 px-4 py-3 mono text-[12px] leading-6 resize-none text-white/80 placeholder-white/25"
              />
              <div className="mt-2 flex items-center justify-between">
                <span className="mono text-[10px] text-white/30">{jdText.length.toLocaleString()} chars</span>
                {jdText&&<span className="mono text-[10px] text-[#4ade80]">✓ JD ready</span>}
              </div>
            </div>
          </div>

          {/* Resume Panel */}
          <div className="reveal reveal-delay-1 feat-card rounded-2xl border border-white/10 bg-[#0a0a0b] overflow-hidden">
            <div className="bar bg-[#15151a] border-b border-white/5 px-5 h-10 flex items-center gap-2">
              <span className="w-2.5 h-2.5 rounded-full bg-white/15"/>
              <span className="w-2.5 h-2.5 rounded-full bg-white/15"/>
              <span className="w-2.5 h-2.5 rounded-full bg-[#ffd84d]"/>
              <span className="mono text-[11px] text-white/50 ml-2">candidates/ ({files.length})</span>
            </div>
            <div className="p-5">
              <div
                onDragOver={e=>{e.preventDefault();setDragging(true);}}
                onDragLeave={()=>setDragging(false)}
                onDrop={handleDrop}
                onClick={()=>fileRef.current?.click()}
                className={`border-2 border-dashed rounded-xl p-8 text-center cursor-pointer transition-all
                  ${dragging?'border-[#ffd84d] bg-[rgba(255,216,77,.05)]':'border-white/10 hover:border-white/30'}`}
              >
                <div className="text-3xl mb-3">📄</div>
                <div className="text-[14px] font-medium">Drop resumes here</div>
                <div className="text-[12px] text-white/40 mt-1">PDF · DOCX · LinkedIn JSON</div>
                <div className="mono text-[10px] text-white/25 mt-3">or click to browse · max 20 files</div>
                <input ref={fileRef} type="file" multiple accept=".pdf,.docx,.doc,.json" onChange={handleFileChange} className="hidden"/>
              </div>

              {files.length>0&&(
                <div className="mt-4 space-y-2 max-h-44 overflow-y-auto scrollbar-hide">
                  {files.map((f,i)=>(
                    <div key={i} className="flex items-center gap-3 px-3 py-2 rounded-lg bg-white/[.03] border border-white/5 group">
                      <span className="mono text-[10px] text-[#ffd84d] w-6">
                        {f.name.endsWith('.pdf')?'PDF':f.name.endsWith('.json')?'LI':'DOC'}
                      </span>
                      <span className="text-[12px] text-white/70 flex-1 truncate">{f.name}</span>
                      <span className="mono text-[10px] text-white/30">{(f.size/1024).toFixed(0)}kb</span>
                      <button onClick={()=>removeFile(i)} className="text-white/20 hover:text-red-400 transition opacity-0 group-hover:opacity-100 text-sm">×</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>

        {/* Rubric info */}
        <div className="reveal mt-8 rounded-2xl border border-white/5 bg-white/[.02] p-6">
          <div className="mono text-[10px] text-white/40 uppercase tracking-widest mb-4">Scoring Rubric (5 Dimensions)</div>
          <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
            {[
              {n:'Skills Match',w:'30%',c:'#ffd84d'},
              {n:'Experience',w:'25%',c:'#7cd6c8'},
              {n:'Education & Certs',w:'15%',c:'#a78bfa'},
              {n:'Projects',w:'20%',c:'#fb923c'},
              {n:'Communication',w:'10%',c:'#4ade80'},
            ].map((d,i)=>(
              <div key={i} className="text-center">
                <div className="mono text-[18px] font-bold" style={{color:d.c}}>{d.w}</div>
                <div className="text-[11px] text-white/60 mt-1">{d.n}</div>
              </div>
            ))}
          </div>
        </div>

        {error&&<div className="mt-4 px-4 py-3 rounded-xl border border-red-500/30 bg-red-500/10 text-red-300 text-[13px]">{error}</div>}

        <div className="mt-8 flex justify-center">
          <MetalBtn onClick={handleSubmit} className="!h-14 !px-10 !text-[16px]">
            Analyze Candidates
          </MetalBtn>
        </div>
      </div>
    </section>
  );
}

// ── Processing view ───────────────────────────────────────────────────────────
function ProcessingView({jdText,files,onDone,onError}){
  const [step,setStep]=useState(0);
  const [log,setLog]=useState([]);
  const steps=[
    {t:'Sanitizing inputs',d:'Removing injection vectors, normalizing text…'},
    {t:'Parsing Job Description',d:'Extracting skills, requirements, domain context…'},
    {t:`Parsing ${files.length} candidate profile${files.length>1?'s':''}`,d:'PDF/DOCX text extraction, LinkedIn JSON mapping…'},
    {t:'Semantic matching',d:'Embeddings similarity + heuristic rubric scoring…'},
    {t:'Ranking & report',d:'Computing weighted totals, generating shortlist…'},
  ];

  useEffect(()=>{
    const run=async()=>{
      try{
        const addLog=msg=>setLog(prev=>[...prev,msg]);

        for(let i=0;i<steps.length-1;i++){
          setStep(i);
          addLog(`[${new Date().toLocaleTimeString()}] ${steps[i].t}…`);
          await new Promise(r=>setTimeout(r,400+Math.random()*400));
        }

        setStep(steps.length-1);
        addLog(`[${new Date().toLocaleTimeString()}] Sending to backend…`);

        const form=new FormData();
        form.append('jd_text',jdText);
        files.forEach(f=>form.append('files',f,f.name));

        const res=await fetch(`${API}/analyze`,{method:'POST',body:form});
        if(!res.ok){
          const err=await res.text();
          throw new Error(`HTTP ${res.status}: ${err}`);
        }
        const session=await res.json();
        addLog(`[${new Date().toLocaleTimeString()}] Done — ${session.results.length} candidates ranked.`);
        setTimeout(()=>onDone(session),600);
      }catch(err){
        onError(err.message||String(err));
      }
    };
    run();
  },[]);

  return (
    <section className="relative min-h-screen pt-28 pb-20 flex items-center">
      <div className="absolute inset-0"><ParticleField/><div className="absolute dots-bg inset-0 opacity-20"/></div>
      <div className="relative max-w-2xl mx-auto px-6 w-full">
        <Steps current={2}/>
        <div className="codewin rounded-2xl overflow-hidden glow">
          <div className="bar h-9 px-4 flex items-center gap-2">
            <span className="w-2.5 h-2.5 rounded-full bg-[#ff5f57]"/>
            <span className="w-2.5 h-2.5 rounded-full bg-[#febc2e]"/>
            <span className="w-2.5 h-2.5 rounded-full bg-[#28c840]"/>
            <span className="mono text-[11px] text-white/50 ml-2">hr-scout · analyzing…</span>
          </div>
          <div className="p-6 space-y-3">
            {steps.map((s,i)=>(
              <div key={i} className={`flex items-start gap-3 transition-all duration-500 ${i>step?'opacity-20':''}`}>
                <span className={`mono text-[11px] mt-0.5 w-4 shrink-0 ${i<step?'text-[#4ade80]':i===step?'text-[#ffd84d]':'text-white/20'}`}>
                  {i<step?'✓':i===step?'›':'·'}
                </span>
                <div>
                  <div className={`text-[13px] font-medium ${i===step?'text-white':i<step?'text-white/60':'text-white/25'}`}>{s.t}</div>
                  {i===step&&<div className="mono text-[11px] text-white/40 mt-0.5">{s.d}</div>}
                </div>
                {i===step&&<div className="ml-auto mono text-[11px] text-[#ffd84d] animate-pulse shrink-0">running…</div>}
              </div>
            ))}

            {/* progress bar */}
            <div className="mt-6 score-bar">
              <div className="score-fill bg-[#ffd84d]" style={{width:`${(step/(steps.length-1))*100}%`,transition:'width .6s ease'}}/>
            </div>

            {/* live log */}
            <div className="mt-4 space-y-1 max-h-32 overflow-y-auto scrollbar-hide">
              {log.map((l,i)=>(
                <div key={i} className="mono text-[10px] text-white/35 fade-in">{l}</div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

// ── Score bar component ───────────────────────────────────────────────────────
function ScoreBar({score,max=10}){
  const pct=Math.min(100,(score/max)*100);
  return (
    <div className="flex items-center gap-2">
      <div className="score-bar flex-1 h-[5px]">
        <div className="score-fill" style={{width:`${pct}%`,background:scoreColor(score)}}/>
      </div>
      <span className="mono text-[11px] w-8 text-right" style={{color:scoreColor(score)}}>{score.toFixed(1)}</span>
    </div>
  );
}

// ── Override modal ────────────────────────────────────────────────────────────
function OverrideModal({candidate,sessionId,onClose,onSaved}){
  const dims=[
    {k:'skills_match',l:'Skills Match (30%)'},
    {k:'experience_relevance',l:'Experience Relevance (25%)'},
    {k:'education_certs',l:'Education & Certs (15%)'},
    {k:'project_portfolio',l:'Project Portfolio (20%)'},
    {k:'communication_quality',l:'Communication Quality (10%)'},
  ];
  const [dim,setDim]=useState(dims[0].k);
  const [score,setScore]=useState('');
  const [reason,setReason]=useState('');
  const [flag,setFlag]=useState(false);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');

  const handleSave=async()=>{
    if(!reason.trim()){setErr('Reason is required.');return;}
    const s=parseFloat(score);
    if(isNaN(s)||s<0||s>10){setErr('Score must be 0–10.');return;}
    setSaving(true);setErr('');
    try{
      const res=await fetch(`${API}/sessions/${sessionId}/candidates/${candidate.candidate_id}/override`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({dimension:dim,new_score:s,reason,hr_user:'HR Manager',flag}),
      });
      if(!res.ok) throw new Error(await res.text());
      const updated=await res.json();
      onSaved(updated);
      onClose();
    }catch(e){setErr(e.message);}finally{setSaving(false);}
  };

  return (
    <div className="fixed inset-0 z-[100] flex items-center justify-center p-4" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="absolute inset-0 bg-black/70 backdrop-blur-sm"/>
      <div className="relative w-full max-w-md bg-[#111] border border-white/10 rounded-2xl p-6 slide-up">
        <div className="flex items-center justify-between mb-5">
          <div>
            <div className="text-[16px] font-semibold">HR Override</div>
            <div className="text-[12px] text-white/40 mt-0.5">{candidate.name}</div>
          </div>
          <button onClick={onClose} className="text-white/30 hover:text-white text-xl">×</button>
        </div>

        <div className="space-y-4">
          <div>
            <label className="mono text-[10px] text-white/40 uppercase tracking-widest block mb-2">Dimension</label>
            <select value={dim} onChange={e=>setDim(e.target.value)} className="w-full px-3 py-2.5 text-[13px] rounded-lg">
              {dims.map(d=><option key={d.k} value={d.k}>{d.l}</option>)}
            </select>
          </div>
          <div>
            <label className="mono text-[10px] text-white/40 uppercase tracking-widest block mb-2">New Score (0–10)</label>
            <input
              type="number" min="0" max="10" step="0.5"
              value={score} onChange={e=>setScore(e.target.value)}
              placeholder="e.g. 7.5"
              className="w-full px-3 py-2.5 text-[13px] rounded-lg"
            />
            <div className="mono text-[10px] text-white/25 mt-1">
              Current: {candidate.scores[dim]?.score.toFixed(1)}/10
            </div>
          </div>
          <div>
            <label className="mono text-[10px] text-white/40 uppercase tracking-widest block mb-2">Reason (required)</label>
            <textarea
              value={reason} onChange={e=>setReason(e.target.value)}
              placeholder="e.g. Reviewed GitHub profile — additional relevant experience confirmed"
              className="w-full px-3 py-2.5 text-[13px] rounded-lg h-20 resize-none"
            />
          </div>
          <label className="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" checked={flag} onChange={e=>setFlag(e.target.checked)} className="w-4 h-4"/>
            <span className="text-[13px] text-white/70">Flag candidate for further review</span>
          </label>
        </div>

        {err&&<div className="mt-3 text-red-400 text-[12px]">{err}</div>}

        <div className="mt-5 flex gap-2 justify-end">
          <MetalBtn dark onClick={onClose} icon="">Cancel</MetalBtn>
          <MetalBtn onClick={handleSave} disabled={saving} icon="">
            {saving?'Saving…':'Save Override'}
          </MetalBtn>
        </div>
      </div>
    </div>
  );
}

        )}

      {overrideOpen&&(
        <OverrideModal
          candidate={{...r,scores:{

            experience_relevance:r.scores.experience_relevance,
            education_certs:r.scores.education_certs,
            project_portfolio:r.scores.project_portfolio,
            communication_quality:r.scores.communication_quality,
          }}}
          sessionId={sessionId}
          onClose={()=>setOverrideOpen(false)}
          onSaved={updated=>{ onUpdate(updated); setOverrideOpen(false); }}
        />
      )}
    </>
  );
}

// ── Results view ──────────────────────────────────────────────────────────────
function ResultsView({session,onNew}){
  useReveal();
  const [sess,setSess]=useState(session);
  const [downloading,setDownloading]=useState('');
  const s=sess;

  const handleUpdate=useCallback(updated=>{
    setSess(prev=>({...prev,results:prev.results.map(r=>r.candidate_id===updated.candidate_id?updated:r).sort((a,b)=>b.total_score-a.total_score).map((r,i)=>({...r,rank:i+1}))}));
  },[]);

  const download=async(fmt)=>{
    setDownloading(fmt);
    try{
      const res=await fetch(`${API}/sessions/${s.session_id}/report/${fmt}`);
      if(!res.ok) throw new Error(await res.text());
      const blob=await res.blob();
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download=`shortlist_${s.session_id.slice(0,8)}.${fmt}`;
      a.click();URL.revokeObjectURL(url);
    }catch(e){alert('Download failed: '+e.message);}
    finally{setDownloading('');}
  };

  const hire=s.results.filter(r=>r.recommendation==='hire');
  const border=s.results.filter(r=>r.recommendation==='borderline');
  const noHire=s.results.filter(r=>r.recommendation==='no_hire');
  const avg=s.results.length?s.results.reduce((a,r)=>a+r.total_score,0)/s.results.length:0;

  return (
    <section className="relative min-h-screen pt-28 pb-20">
      <div className="absolute inset-0 dots-bg opacity-15 pointer-events-none"/>
      <div className="absolute -top-20 left-1/2 -translate-x-1/2 w-[600px] h-[600px] rounded-full pointer-events-none"
        style={{background:'radial-gradient(closest-side,rgba(255,216,77,.1),transparent 70%)'}}/>

      <div className="relative max-w-5xl mx-auto px-6">
        <Steps current={3}/>

        {/* Header */}
        <div className="reveal flex flex-wrap items-start justify-between gap-4 mb-8">
          <div>
            <div className="mono text-[11px] text-[#ffd84d] uppercase tracking-widest mb-2">/ Shortlist Complete</div>
            <h2 className="serif text-[48px] md:text-[64px] leading-[.9] tracking-tighter">
              <span className="grad-text">{s.results.length}</span> candidates.<br/>
              <span className="gold-text italic">Ranked.</span>
            </h2>
            <p className="text-white/50 text-[14px] mt-3 max-w-xl">{s.shortlist_summary}</p>
          </div>
          <div className="flex gap-2 flex-wrap shrink-0 pt-2">
            {['json','html','pdf'].map(fmt=>(
              <MetalBtn key={fmt} dark onClick={()=>download(fmt)} disabled={!!downloading}
                icon={downloading===fmt?'…':'↓'} className="!h-9 !px-4 !text-[12px] !gap-1.5">
                {fmt.toUpperCase()}
              </MetalBtn>
            ))}
            <MetalBtn onClick={onNew} className="!h-9 !px-4 !text-[12px]">New Analysis</MetalBtn>
          </div>
        </div>

        {/* Stats */}
        <div className="reveal grid grid-cols-2 md:grid-cols-4 gap-px bg-white/5 rounded-2xl overflow-hidden border border-white/8 mb-8">
          {[
            {n:s.results.length,l:'Analyzed',c:'#eae7df'},
            {n:hire.length,l:'Hire',c:'#4ade80'},
            {n:border.length,l:'Borderline',c:'#fbbf24'},
            {n:avg.toFixed(0),l:'Avg Score',c:'#ffd84d'},
          ].map((st,i)=>(
            <div key={i} className="bg-[#0a0a0b] p-6">
              <div className="serif text-[44px] leading-none tracking-tighter" style={{color:st.c}}>{st.n}</div>
              <div className="mono text-[10px] text-white/35 uppercase tracking-widest mt-2">{st.l}</div>
            </div>
          ))}
        </div>

        {/* Candidate cards */}
        <div className="space-y-4">
          {s.results.map(r=>(
            <CandidateCard key={r.candidate_id} result={r} sessionId={s.session_id} onUpdate={handleUpdate}/>
          ))}
        </div>

        {/* Session info */}
        <div className="mt-10 reveal codewin rounded-2xl p-5">
          <div className="mono text-[10px] text-white/30 uppercase tracking-widest mb-3">Session Info</div>
          <div className="grid md:grid-cols-3 gap-4 mono text-[11px]">
            <div><span className="text-white/30">session_id: </span><span className="text-[#ffd84d]">{s.session_id.slice(0,16)}…</span></div>
            <div><span className="text-white/30">jd_title: </span><span className="text-white/70">{s.jd_profile.title}</span></div>
            <div><span className="text-white/30">domain: </span><span className="text-white/70">{s.jd_profile.domain}</span></div>
          </div>
          <div className="mt-3 grid md:grid-cols-3 gap-4 mono text-[11px]">
            <div><span className="text-white/30">required_skills: </span><span className="text-[#7cd6c8]">{s.jd_profile.required_skills?.slice(0,5).join(', ')}…</span></div>
            <div><span className="text-white/30">min_years: </span><span className="text-white/70">{s.jd_profile.years_experience_min}+</span></div>
            <div><span className="text-white/30">education: </span><span className="text-white/70">{s.jd_profile.education_requirement}</span></div>
          </div>
        </div>
      </div>
    </section>
  );
}

          <MetalBtn onClick={onStart} className="!h-14 !px-8 !text-[16px]">Start Analysis</MetalBtn>
          <a href="/docs" target="_blank"
            className="inline-flex items-center gap-2 h-14 px-8 rounded-full border border-white/15 hover:border-[#ffd84d]/60 transition text-[14px]">
            <span className="mono text-[11px] text-white/40">GET</span> API Docs →
          </a>
        </div>

        {/* features */}
        <div className="mt-20 grid md:grid-cols-3 gap-px bg-white/5 rounded-2xl overflow-hidden border border-white/10">
          {features.map((f,i)=>(
            <div key={i} className="feat-card reveal p-7 bg-[#0a0a0b] min-h-[220px] flex flex-col text-left" style={{transitionDelay:`${i%3*.05}s`}}>
              <div className="serif text-4xl text-[#ffd84d] mb-5">{f.icon}</div>
              <div className="text-[16px] font-medium tracking-tight">{f.t}</div>
              <div className="mt-2 text-[13px] text-white/55 leading-relaxed">{f.d}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

// ── Footer ────────────────────────────────────────────────────────────────────
function Footer(){
  return (
    <footer className="border-t border-white/8 py-10">
      <div className="max-w-6xl mx-auto px-6 flex flex-wrap justify-between items-center gap-4">
        <div className="flex items-center gap-2.5">
          <ScoutMark size={20}/><span className="text-[14px] font-semibold">HR Scout</span>
          <span className="mono text-[10px] text-white/30">v1.0 · AI-Powered Shortlisting</span>
        </div>
        <div className="mono text-[11px] text-white/30">
          Built by Ayush Aryan · FastAPI · sentence-transformers · ReportLab
        </div>
        <div className="mono text-[11px] text-white/25">All scores are AI-assisted — human judgment applies</div>
      </div>
    </footer>
  );
}

// ── App shell ─────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('home'); // home | upload | processing | results | error
  const [jdText,setJdText]=useState('');
  const [files,setFiles]=useState([]);
  const [session,setSession]=useState(null);
  const [errorMsg,setErrorMsg]=useState('');

  const handleStart=()=>setView('upload');

  const handleAnalyze=(jd,fls)=>{
    setJdText(jd);setFiles(fls);setView('processing');
  };

  const handleDone=sess=>{setSession(sess);setView('results');};
  const handleError=msg=>{setErrorMsg(msg);setView('error');};
  const handleNew=()=>{setSession(null);setJdText('');setFiles([]);setView('upload');};

  return (
    <>
      <Navbar view={view} setView={v=>{if(v==='upload'&&view!=='upload')handleNew();else setView(v);}}/>
      {view==='home'&&<><Hero onStart={handleStart}/><Footer/></>}
      {view==='upload'&&<UploadView onAnalyze={handleAnalyze}/>}
      {view==='processing'&&<ProcessingView jdText={jdText} files={files} onDone={handleDone} onError={handleError}/>}
      {view==='results'&&session&&<><ResultsView session={session} onNew={handleNew}/><Footer/></>}
      {view==='error'&&<ErrorView message={errorMsg} onBack={()=>setView('upload')}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
